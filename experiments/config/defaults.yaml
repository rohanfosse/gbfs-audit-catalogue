# ─── GBFS Audit Catalogue — Experiment hyperparameters ───────────────
# All thresholds are documented here for reproducibility (ISO 25012
# understandability). Override per-run via CLI or environment.

xp1_dynamic_audit:
  collection:
    interval_minutes: 15
    duration_days: 14
    max_concurrent_feeds: 50
    request_timeout_s: 30
    retry_attempts: 3
  zombie_detection:
    # Minimum observation window to declare a station dead
    min_snapshots: 100
    # A station is "zombie" if variance of available bikes + docks == 0
    # over the full window AND last_reported is stale by this many hours
    staleness_threshold_hours: 72
    # Entropy threshold: H(availability_vector) < epsilon => frozen
    entropy_epsilon: 0.01
    # Fraction of zero-variance snapshots to flag as "intermittent zombie"
    intermittent_threshold: 0.90

xp2_spatial_topology:
  # ── HDBSCAN parameters ──
  hdbscan:
    min_cluster_size: 5
    min_samples: 3
    cluster_selection_epsilon: 500.0  # metres
    metric: haversine
  # ── Spectral graph analysis ──
  spectral:
    k_nearest: 7
    sigma_bandwidth_m: 2000.0
    n_eigenvectors: 10
    # Fiedler-value threshold below which a component is "loosely connected"
    fiedler_threshold: 0.05
  # ── Legacy centroid (for ablation comparison) ──
  legacy_centroid:
    sigma_max: 3.0
    use_mad: true  # median absolute deviation vs. standard deviation

xp3_looo_validation:
  # Minimum stations per operator to include in the validation
  min_stations_per_operator: 50
  # Minimum systems per operator
  min_systems_per_operator: 2
  # Rules to evaluate
  rules: [A1, A2, A3, A4, A5, A6, A7]
  # Bootstrap confidence intervals
  bootstrap:
    n_iterations: 1000
    confidence_level: 0.95
    random_seed: 42
  # Stratification: ensure geographic diversity in each fold
  stratify_by_country: true
